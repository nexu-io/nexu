name: Desktop CI Dist

on:
  pull_request:
    paths:
      - "apps/desktop/**"
      - "apps/api/**"
      - "apps/gateway/**"
      - "apps/web/**"
      - "packages/shared/**"
      - "openclaw-runtime/**"
      - ".npmrc"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".github/workflows/desktop-ci-dist.yml"
  push:
    branches:
      - main
    paths:
      - "apps/desktop/**"
      - "apps/api/**"
      - "apps/gateway/**"
      - "apps/web/**"
      - "packages/shared/**"
      - "openclaw-runtime/**"
      - ".npmrc"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".github/workflows/desktop-ci-dist.yml"

permissions:
  contents: read

concurrency:
  group: desktop-ci-dist-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  desktop-ci:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Show desktop toolchain versions
        shell: bash
        run: |
          set -euo pipefail
          pnpm exec electron --version

      - name: Build unsigned macOS desktop bundle
        run: pnpm desktop:dist:mac:unsigned

      - name: Set packaged app paths
        shell: bash
        run: |
          set -euo pipefail

          runner_home="$HOME"
          packaged_home="$RUNNER_TEMP/desktop-home"
          packaged_logs_dir="$packaged_home/Library/Logs/Nexu Desktop"
          packaged_user_data_dir="$packaged_home/Library/Application Support/Nexu Desktop"
          packaged_runtime_logs_dir="$packaged_home/Library/Application Support/logs/runtime-units"
          default_logs_dir="$runner_home/Library/Logs/Nexu Desktop"
          default_user_data_dir="$runner_home/Library/Application Support/@nexu/desktop"
          default_runtime_logs_dir="$runner_home/Library/Application Support/logs/runtime-units"
          packaged_app="apps/desktop/release/mac-arm64/Nexu.app"
          packaged_executable="$packaged_app/Contents/MacOS/Nexu"

          mkdir -p "$RUNNER_TEMP/desktop-ci" "$packaged_home" "$RUNNER_TEMP/desktop-tmp"

          {
            echo "PACKAGED_HOME=$packaged_home"
            echo "PACKAGED_LOGS_DIR=$packaged_logs_dir"
            echo "PACKAGED_USER_DATA_DIR=$packaged_user_data_dir"
            echo "PACKAGED_RUNTIME_LOGS_DIR=$packaged_runtime_logs_dir"
            echo "DEFAULT_LOGS_DIR=$default_logs_dir"
            echo "DEFAULT_USER_DATA_DIR=$default_user_data_dir"
            echo "DEFAULT_RUNTIME_LOGS_DIR=$default_runtime_logs_dir"
            echo "PACKAGED_APP=$packaged_app"
            echo "PACKAGED_EXECUTABLE=$packaged_executable"
          } >> "$GITHUB_ENV"

      - name: Verify packaged desktop artifacts
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          dmg_artifacts=(apps/desktop/release/*.dmg)
          zip_artifacts=(apps/desktop/release/*.zip)

          if [ "${#dmg_artifacts[@]}" -eq 0 ]; then
            echo "No desktop DMG artifact was produced" >&2
            exit 1
          fi

          if [ "${#zip_artifacts[@]}" -eq 0 ]; then
            echo "No desktop ZIP artifact was produced" >&2
            exit 1
          fi

          printf 'Built artifacts:\n'
          printf ' - %s\n' "${dmg_artifacts[@]}"
          printf ' - %s\n' "${zip_artifacts[@]}"

          test -d "$PACKAGED_APP"
          test -x "$PACKAGED_EXECUTABLE"

      - name: Launch packaged desktop app
        shell: bash
        run: |
          set -euo pipefail

          HOME="$PACKAGED_HOME" TMPDIR="$RUNNER_TEMP/desktop-tmp" "$PACKAGED_EXECUTABLE" \
            > "$RUNNER_TEMP/desktop-ci/packaged-app.log" 2>&1 &
          app_pid=$!
          echo "$app_pid" > "$RUNNER_TEMP/desktop-ci/packaged-app.pid"
          echo "Launched packaged app pid=$app_pid"

      - name: Wait for desktop sidecars to become ready
        shell: bash
        run: |
          set -euo pipefail

          app_pid=$(cat "$RUNNER_TEMP/desktop-ci/packaged-app.pid")

          check_url() {
            local name="$1"
            local url="$2"
            local body

            body=$(curl --silent --show-error --fail "$url")
            echo "[$name] $body"
            [[ "$body" == *'"ready":true'* ]]
          }

          check_web_surface() {
            local body

            body=$(curl --silent --show-error --fail "http://127.0.0.1:50810/")
            echo "[web-surface] received ${#body} bytes"
            [[ "$body" == *"<div id=\"root\"></div>"* ]]
          }

          for attempt in {1..60}; do
            echo "Readiness attempt $attempt/60"

            if ! kill -0 "$app_pid" 2>/dev/null; then
              echo "Packaged desktop app exited before readiness checks completed" >&2
              exit 1
            fi

            all_ports_ready=true
            for port in 50800 50810 50832; do
              if ! lsof -iTCP:"$port" -sTCP:LISTEN >/dev/null 2>&1; then
                all_ports_ready=false
                echo "Port $port is not listening yet"
              fi
            done

            api_ready=false
            web_ready=false
            web_surface_ready=false

            if check_url "api" "http://127.0.0.1:50800/api/internal/desktop/ready"; then
              api_ready=true
            fi

            if check_url "web" "http://127.0.0.1:50810/api/internal/desktop/ready"; then
              web_ready=true
            fi

            if check_web_surface; then
              web_surface_ready=true
            fi

            if [ "$all_ports_ready" = true ] && [ "$api_ready" = true ] && [ "$web_ready" = true ] && [ "$web_surface_ready" = true ]; then
              echo "All desktop sidecars are ready"
              exit 0
            fi

            sleep 5
          done

          echo "Desktop sidecars did not become ready in time" >&2
          exit 1

      - name: Verify packaged runtime unit health
        shell: bash
        run: |
          set -euo pipefail

          app_log="$RUNNER_TEMP/desktop-ci/packaged-app.log"
          app_pid=$(cat "$RUNNER_TEMP/desktop-ci/packaged-app.pid")

          require_log() {
            local message="$1"
            local error_message="$2"
            grep -F "$message" "$app_log" >/dev/null || {
              echo "$error_message" >&2
              exit 1
            }
          }

          for attempt in {1..60}; do
            echo "Runtime health attempt $attempt/60"

            if grep -F "spawned openclaw gateway process" "$app_log" >/dev/null && \
              grep -F "[gateway] listening on ws://0.0.0.0:18789" "$app_log" >/dev/null; then
              break
            fi

            sleep 2
          done

          require_log "cold start complete" "Cold start completion log not found"
          require_log "runtime unit pglite port 50832 is ready" "PGlite readiness log not found"
          require_log "runtime unit api port 50800 is ready" "API readiness log not found"
          require_log "runtime unit web is running" "Web runtime log not found"
          require_log "runtime unit gateway is running" "Gateway runtime log not found"
          require_log "spawned openclaw gateway process" "OpenClaw spawn log not found"
          require_log "[gateway] listening on ws://0.0.0.0:18789" "OpenClaw websocket listener log not found"
          require_log "Browser control listening on http://127.0.0.1:18791/" "OpenClaw browser control listener log not found"
          require_log "did-finish-load" "Packaged renderer load log not found"

          kill -0 "$app_pid" 2>/dev/null || {
            echo "Packaged desktop app exited before health verification completed" >&2
            exit 1
          }

      - name: Capture desktop logs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/desktop-ci"
          if [ -d "$PACKAGED_LOGS_DIR" ]; then
            cp -R "$PACKAGED_LOGS_DIR" "$RUNNER_TEMP/desktop-ci/packaged-logs"
          fi
          if [ -d "$PACKAGED_RUNTIME_LOGS_DIR" ]; then
            cp -R "$PACKAGED_RUNTIME_LOGS_DIR" "$RUNNER_TEMP/desktop-ci/runtime-unit-logs"
          fi
          if [ -d "$DEFAULT_LOGS_DIR" ]; then
            cp -R "$DEFAULT_LOGS_DIR" "$RUNNER_TEMP/desktop-ci/default-logs"
          fi
          if [ -d "$DEFAULT_RUNTIME_LOGS_DIR" ]; then
            cp -R "$DEFAULT_RUNTIME_LOGS_DIR" "$RUNNER_TEMP/desktop-ci/default-runtime-unit-logs"
          fi

      - name: Upload desktop logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-ci-logs
          path: ${{ runner.temp }}/desktop-ci
          if-no-files-found: warn
          retention-days: 7

      - name: Stop packaged desktop app
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "$RUNNER_TEMP/desktop-ci/packaged-app.pid" ]; then
            app_pid=$(cat "$RUNNER_TEMP/desktop-ci/packaged-app.pid")
            kill "$app_pid" 2>/dev/null || true
            wait "$app_pid" 2>/dev/null || true
          fi
