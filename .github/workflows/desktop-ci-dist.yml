name: Desktop CI Dist

on:
  pull_request:
    paths:
      - "apps/desktop/**"
      - "apps/api/**"
      - "apps/gateway/**"
      - "apps/web/**"
      - "packages/shared/**"
      - "openclaw-runtime/**"
      - ".npmrc"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".github/workflows/desktop-ci-dist.yml"
  push:
    branches:
      - main
    paths:
      - "apps/desktop/**"
      - "apps/api/**"
      - "apps/gateway/**"
      - "apps/web/**"
      - "packages/shared/**"
      - "openclaw-runtime/**"
      - ".npmrc"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".github/workflows/desktop-ci-dist.yml"

permissions:
  contents: read

concurrency:
  group: desktop-ci-dist-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  desktop-ci:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Show desktop toolchain versions
        shell: bash
        run: |
          set -euo pipefail
          pnpm exec electron --version

      - name: Build unsigned macOS desktop bundle
        run: pnpm desktop:dist:mac:unsigned

      - name: Set packaged app paths
        shell: bash
        run: |
          set -euo pipefail

          runner_home="$HOME"
          packaged_home="$RUNNER_TEMP/desktop-home"
          packaged_logs_dir="$packaged_home/Library/Logs/Nexu Desktop"
          packaged_user_data_dir="$packaged_home/Library/Application Support/Nexu Desktop"
          packaged_runtime_logs_dir="$packaged_home/Library/Application Support/logs/runtime-units"
          default_logs_dir="$runner_home/Library/Logs/Nexu Desktop"
          default_user_data_dir="$runner_home/Library/Application Support/@nexu/desktop"
          default_runtime_logs_dir="$runner_home/Library/Application Support/logs/runtime-units"
          packaged_app="apps/desktop/release/mac-arm64/Nexu.app"
          packaged_executable="$packaged_app/Contents/MacOS/Nexu"

          mkdir -p "$RUNNER_TEMP/desktop-ci" "$packaged_home" "$RUNNER_TEMP/desktop-tmp"

          {
            echo "PACKAGED_HOME=$packaged_home"
            echo "PACKAGED_LOGS_DIR=$packaged_logs_dir"
            echo "PACKAGED_USER_DATA_DIR=$packaged_user_data_dir"
            echo "PACKAGED_RUNTIME_LOGS_DIR=$packaged_runtime_logs_dir"
            echo "DEFAULT_LOGS_DIR=$default_logs_dir"
            echo "DEFAULT_USER_DATA_DIR=$default_user_data_dir"
            echo "DEFAULT_RUNTIME_LOGS_DIR=$default_runtime_logs_dir"
            echo "PACKAGED_APP=$packaged_app"
            echo "PACKAGED_EXECUTABLE=$packaged_executable"
          } >> "$GITHUB_ENV"

      - name: Verify packaged desktop artifacts
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          dmg_artifacts=(apps/desktop/release/*.dmg)
          zip_artifacts=(apps/desktop/release/*.zip)

          if [ "${#dmg_artifacts[@]}" -eq 0 ]; then
            echo "No desktop DMG artifact was produced" >&2
            exit 1
          fi

          if [ "${#zip_artifacts[@]}" -eq 0 ]; then
            echo "No desktop ZIP artifact was produced" >&2
            exit 1
          fi

          printf 'Built artifacts:\n'
          printf ' - %s\n' "${dmg_artifacts[@]}"
          printf ' - %s\n' "${zip_artifacts[@]}"

          test -d "$PACKAGED_APP"
          test -x "$PACKAGED_EXECUTABLE"

      - name: Launch packaged desktop app
        shell: bash
        run: |
          set -euo pipefail

          HOME="$PACKAGED_HOME" TMPDIR="$RUNNER_TEMP/desktop-tmp" "$PACKAGED_EXECUTABLE" \
            > "$RUNNER_TEMP/desktop-ci/packaged-app.log" 2>&1 &
          app_pid=$!
          echo "$app_pid" > "$RUNNER_TEMP/desktop-ci/packaged-app.pid"
          echo "Launched packaged app pid=$app_pid"

      - name: Wait for desktop sidecars to become ready
        shell: bash
        run: |
          set -euo pipefail

          app_pid=$(cat "$RUNNER_TEMP/desktop-ci/packaged-app.pid")

          check_url() {
            local name="$1"
            local url="$2"
            local body

            body=$(curl --silent --show-error --fail "$url")
            echo "[$name] $body"
            [[ "$body" == *'"ready":true'* ]]
          }

          check_web_surface() {
            local body

            body=$(curl --silent --show-error --fail "http://127.0.0.1:50810/")
            echo "[web-surface] received ${#body} bytes"
            [[ "$body" == *"<div id=\"root\"></div>"* ]]
          }

          for attempt in {1..60}; do
            echo "Readiness attempt $attempt/60"

            if ! kill -0 "$app_pid" 2>/dev/null; then
              echo "Packaged desktop app exited before readiness checks completed" >&2
              exit 1
            fi

            all_ports_ready=true
            for port in 50800 50810 50832; do
              if ! lsof -iTCP:"$port" -sTCP:LISTEN >/dev/null 2>&1; then
                all_ports_ready=false
                echo "Port $port is not listening yet"
              fi
            done

            api_ready=false
            web_ready=false
            web_surface_ready=false

            if check_url "api" "http://127.0.0.1:50800/api/internal/desktop/ready"; then
              api_ready=true
            fi

            if check_url "web" "http://127.0.0.1:50810/api/internal/desktop/ready"; then
              web_ready=true
            fi

            if check_web_surface; then
              web_surface_ready=true
            fi

            if [ "$all_ports_ready" = true ] && [ "$api_ready" = true ] && [ "$web_ready" = true ] && [ "$web_surface_ready" = true ]; then
              echo "All desktop sidecars are ready"
              exit 0
            fi

            sleep 5
          done

          echo "Desktop sidecars did not become ready in time" >&2
          exit 1

      - name: Verify packaged runtime unit health
        shell: bash
        run: |
          set -euo pipefail

          app_pid=$(cat "$RUNNER_TEMP/desktop-ci/packaged-app.pid")
          desktop_logs_dir="$PACKAGED_LOGS_DIR"
          runtime_unit_logs_dir="$PACKAGED_RUNTIME_LOGS_DIR"
          cold_start_log="$desktop_logs_dir/cold-start.log"
          desktop_main_log="$desktop_logs_dir/desktop-main.log"
          pglite_log="$runtime_unit_logs_dir/pglite.log"
          api_log="$runtime_unit_logs_dir/api.log"
          web_log="$runtime_unit_logs_dir/web.log"
          gateway_log="$runtime_unit_logs_dir/gateway.log"
          openclaw_log="$runtime_unit_logs_dir/openclaw.log"

          missing_checks=()

          record_missing() {
            local check_name="$1"
            local detail="$2"
            missing_checks+=("$check_name :: $detail")
          }

          require_file() {
            local check_name="$1"
            local file_path="$2"
            if [ ! -f "$file_path" ]; then
              record_missing "$check_name" "log file missing: $file_path"
            fi
          }

          log_has() {
            local file_path="$1"
            local needle="$2"
            [ -f "$file_path" ] && grep -F "$needle" "$file_path" >/dev/null
          }

          log_has_any() {
            local needle="$1"
            shift
            local file_path
            for file_path in "$@"; do
              if log_has "$file_path" "$needle"; then
                return 0
              fi
            done
            return 1
          }

          for attempt in {1..60}; do
            echo "Runtime health attempt $attempt/60"

            if log_has "$cold_start_log" "cold start complete" && \
              log_has "$gateway_log" "spawned openclaw gateway process" && \
              log_has_any "[gateway] listening on ws://0.0.0.0:18789" "$gateway_log" "$openclaw_log"; then
              break
            fi

            sleep 2
          done

          require_file "desktop bootstrap" "$cold_start_log"
          require_file "electron renderer" "$desktop_main_log"
          require_file "pglite" "$pglite_log"
          require_file "api" "$api_log"
          require_file "web" "$web_log"
          require_file "gateway" "$gateway_log"

          if ! log_has "$cold_start_log" "cold start complete"; then
            record_missing "desktop bootstrap" "missing log: cold start complete"
          fi

          if ! log_has "$pglite_log" "runtime unit pglite port 50832 is ready"; then
            record_missing "pglite" "missing readiness log for port 50832"
          fi

          if ! log_has "$api_log" "runtime unit api port 50800 is ready"; then
            record_missing "api" "missing readiness log for port 50800"
          fi

          if ! log_has "$web_log" "runtime unit web is running"; then
            record_missing "web" "missing running log"
          fi

          if ! log_has "$gateway_log" "runtime unit gateway is running"; then
            record_missing "gateway" "missing running log"
          fi

          if ! log_has "$gateway_log" "initial workspace templates synced"; then
            record_missing "gateway" "missing workspace template sync log"
          fi

          if ! log_has "$gateway_log" "spawned openclaw gateway process"; then
            record_missing "openclaw" "missing spawn log"
          fi

          if ! log_has_any "[gateway] listening on ws://0.0.0.0:18789" "$gateway_log" "$openclaw_log"; then
            record_missing "openclaw" "missing websocket listener log on ws://0.0.0.0:18789"
          fi

          if ! log_has_any "Browser control listening on http://127.0.0.1:18791/" "$gateway_log" "$openclaw_log"; then
            record_missing "openclaw" "missing browser control listener log on http://127.0.0.1:18791/"
          fi

          if ! log_has "$desktop_main_log" "did-finish-load"; then
            record_missing "electron renderer" "missing did-finish-load log"
          fi

          for port_entry in "pglite:50832" "api:50800" "web:50810"; do
            unit_name="${port_entry%%:*}"
            port="${port_entry##*:}"
            if ! lsof -iTCP:"$port" -sTCP:LISTEN >/dev/null 2>&1; then
              record_missing "$unit_name" "port $port is not listening"
            fi
          done

          api_ready_body=$(curl --silent --show-error "http://127.0.0.1:50800/api/internal/desktop/ready" || true)
          if [[ "$api_ready_body" != *'"ready":true'* ]]; then
            record_missing "api" "readiness endpoint body: ${api_ready_body:-<no response>}"
          fi

          web_ready_body=$(curl --silent --show-error "http://127.0.0.1:50810/api/internal/desktop/ready" || true)
          if [[ "$web_ready_body" != *'"ready":true'* ]]; then
            record_missing "web" "readiness endpoint body: ${web_ready_body:-<no response>}"
          fi

          web_surface_body=$(curl --silent --show-error "http://127.0.0.1:50810/" || true)
          if [[ "$web_surface_body" != *'<div id="root"></div>'* ]]; then
            record_missing "web" "root document did not contain app mount node"
          fi

          if [ "${#missing_checks[@]}" -gt 0 ]; then
            printf 'Packaged runtime health verification failed. Missing checks:\n' >&2
            printf ' - %s\n' "${missing_checks[@]}" >&2
            printf '\nPersistent log files checked:\n' >&2
            printf ' - %s\n' "$cold_start_log" "$desktop_main_log" "$pglite_log" "$api_log" "$web_log" "$gateway_log" "$openclaw_log" >&2
            for file_path in "$cold_start_log" "$desktop_main_log" "$pglite_log" "$api_log" "$web_log" "$gateway_log" "$openclaw_log"; do
              if [ -f "$file_path" ]; then
                printf '\n--- %s (last 40 lines) ---\n' "$file_path" >&2
                tail -n 40 "$file_path" >&2 || true
              fi
            done
            exit 1
          fi

          kill -0 "$app_pid" 2>/dev/null || {
            echo "Packaged desktop app exited before health verification completed" >&2
            exit 1
          }

      - name: Capture desktop logs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/desktop-ci"
          if [ -d "$PACKAGED_LOGS_DIR" ]; then
            cp -R "$PACKAGED_LOGS_DIR" "$RUNNER_TEMP/desktop-ci/packaged-logs"
          fi
          if [ -d "$PACKAGED_RUNTIME_LOGS_DIR" ]; then
            cp -R "$PACKAGED_RUNTIME_LOGS_DIR" "$RUNNER_TEMP/desktop-ci/runtime-unit-logs"
          fi
          if [ -d "$DEFAULT_LOGS_DIR" ]; then
            cp -R "$DEFAULT_LOGS_DIR" "$RUNNER_TEMP/desktop-ci/default-logs"
          fi
          if [ -d "$DEFAULT_RUNTIME_LOGS_DIR" ]; then
            cp -R "$DEFAULT_RUNTIME_LOGS_DIR" "$RUNNER_TEMP/desktop-ci/default-runtime-unit-logs"
          fi

      - name: Upload desktop logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-ci-logs
          path: ${{ runner.temp }}/desktop-ci
          if-no-files-found: warn
          retention-days: 7

      - name: Stop packaged desktop app
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "$RUNNER_TEMP/desktop-ci/packaged-app.pid" ]; then
            app_pid=$(cat "$RUNNER_TEMP/desktop-ci/packaged-app.pid")
            kill "$app_pid" 2>/dev/null || true
            wait "$app_pid" 2>/dev/null || true
          fi
