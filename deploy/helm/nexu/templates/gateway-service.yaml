apiVersion: v1
kind: Service
metadata:
  name: {{ include "nexu.gateway.fullname" . }}
  namespace: {{ include "nexu.namespace" . }}
  labels:
    {{- include "nexu.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - name: gateway
      port: {{ .Values.gateway.service.port }}
      targetPort: gateway
      protocol: TCP
  selector:
    {{- include "nexu.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
