{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "nexu.fullname" . }}
  namespace: {{ include "nexu.namespace" . }}
  labels:
    {{- include "nexu.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                {{- if eq .service "api" }}
                name: {{ include "nexu.api.fullname" $ }}
                {{- else if eq .service "web" }}
                name: {{ include "nexu.web.fullname" $ }}
                {{- else }}
                name: {{ .service }}
                {{- end }}
                port:
                  {{- if eq .service "api" }}
                  number: {{ $.Values.api.service.port }}
                  {{- else if eq .service "web" }}
                  number: {{ $.Values.web.service.port }}
                  {{- else }}
                  number: 80
                  {{- end }}
          {{- end }}
    {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
