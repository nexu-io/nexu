    image: https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f4d6.png
    trigger:
      type: pull_request
      merged: true
      count: 1
      labels:
        - documentation

  # ── ONBOARDING ───────────────────────────────────────────────────────────────

  - name: Good First Step
    body: >
      Resolved a good-first-issue. Every expert was a beginner once — welcome
