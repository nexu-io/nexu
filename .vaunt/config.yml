    image: https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f947.png
    trigger:
      type: pull_request
      merged: true
      count: 25

  - name: Nexu Legend
    body: >
      Fifty pull requests merged. You've shaped this project at a fundamental
