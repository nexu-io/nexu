    image: https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f948.png
    trigger:
      type: pull_request
      merged: true
      count: 10

  - name: Core Contributor
    body: >
      Twenty-five pull requests merged. Nexu wouldn't be the same codebase
