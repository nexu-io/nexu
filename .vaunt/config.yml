    image: https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f331.png
    trigger:
      type: pull_request
      merged: true
      count: 1
      labels:
        - good first issue

  - name: Helper
    body: >
      Picked up and closed a help-wanted issue. You saw something that needed
